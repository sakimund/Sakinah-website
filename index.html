<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sakinah Munday</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; }
  html { overflow-y: scroll; }
  body {
    font-family: "Source Serif 4", Georgia, serif;
    background: #ffffff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100vh; }
  a:hover { opacity: 0.78; }
  button { cursor: pointer; }
  /* Soft transition between the two themes */
  body, #root > div { transition: background-color .35s ease, color .35s ease; }
</style>
</head>
<body style="font-family: Raleway">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="direction.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": false,
      "accent": "#c7297f"
    }/*EDITMODE-END*/;

    const ACCENT_OPTIONS = [
      '#c7297f', // magenta
      '#2c63d6', // royal blue
      '#8a4a2c', // terracotta
      '#1f6b4e', // forest
    ];

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <React.Fragment>
          <DirZacka darkMode={t.dark} accent={t.accent} />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme" />
            <TweakToggle
              label="Dark mode"
              value={t.dark}
              onChange={(v) => setTweak('dark', v)}
            />
            <TweakColor
              label="Accent"
              value={t.accent}
              options={ACCENT_OPTIONS}
              onChange={(v) => setTweak('accent', v)}
            />
            <div style={{ fontSize: '11px', color: 'rgba(41,38,27,.55)', lineHeight: 1.5, marginTop: '8px' }}>
              Use the top nav to walk through About / Research / Teaching / CV.
            </div>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
